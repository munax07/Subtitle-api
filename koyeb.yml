name: opensubtitles-proxy
service:
  name: opensubtitles-proxy
  instance_type: nano
  routes:
    - port: 3000
      path: /
      protocol: http
  env:
    - name: NODE_ENV
      value: production
    - name: KOYEB
      value: "true"
    - name: CACHE_TTL_SEARCH
      value: "300"
    - name: CACHE_TTL_DOWNLOAD_META
      value: "600"
    - name: RATE_LIMIT_MAX
      value: "100"
  git:
    repository: yourusername/opensubtitles-proxy
    branch: main
  build:
    command: npm install
  run:
    command: node --expose-gc server.js
  scaling:
    min: 1
    max: 1
  regions:
    - was   # US West (or fra for Europe, sin for Asia)
